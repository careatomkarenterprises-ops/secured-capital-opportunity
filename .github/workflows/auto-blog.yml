name: Auto Blog Generator

on:
  schedule:
    - cron: '00 11 * * 1-5'  # Market report at 4:30 PM IST weekdays
    - cron: '30 20 * * *'    # Educational at 2:00 AM IST
  workflow_dispatch:

jobs:
  generate-market-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Pull latest changes
      run: git pull origin main --rebase
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install python-slugify requests beautifulsoup4
    
    - name: Generate market report
      run: python market_report_generator.py
    
    - name: Commit and push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add blog/ sitemap.xml
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated market report [skip ci]"
        git pull origin main --rebase
        git push origin main

  generate-educational-blogs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Pull latest changes
      run: git pull origin main --rebase
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install python-slugify requests beautifulsoup4
    
    - name: Generate educational blogs
      run: python main_runner.py
    
    - name: Commit and push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add blog/ sitemap.xml index.html services/ *.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated educational posts [skip ci]"
        git pull origin main --rebase
        git push origin main
