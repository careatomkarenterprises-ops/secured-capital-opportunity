name: Auto Blog Generator

on:
  schedule:
    # Market Report - weekdays 4:30 PM IST (11:00 UTC)
    - cron: '00 11 * * 1-5'
    # Educational Articles - daily at 2:00 AM IST (8:30 PM UTC)
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  generate-market-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '00 11 * * 1-5' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate Daily Market Report
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        python market_report_generator.py
    
    - name: Commit and push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add blog/ sitemap.xml
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated market report $(date +'%Y-%m-%d')"
        git pull origin main --rebase --strategy-option=ours || true
        git push origin main --force-with-lease

  generate-educational-blogs:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 20 * * *' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate Educational Blog Posts
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        python main_runner.py
    
    - name: Commit and push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add blog/ sitemap.xml index.html services/ *.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated educational posts $(date +'%Y-%m-%d')"
        git pull origin main --rebase --strategy-option=ours || true
        git push origin main --force-with-lease
