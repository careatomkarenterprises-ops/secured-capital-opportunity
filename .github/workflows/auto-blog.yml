name: Auto Blog Generator

on:
  schedule:
    # Run daily at 2 AM IST (8:30 PM UTC previous day)
    - cron: '30 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install python-slugify
        
    - name: Pull latest changes
      run: |
        git pull origin main
        
    - name: Generate blog posts (5 articles per run)
      run: |
        python main_runner.py
        
    - name: Configure Git
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
    - name: Commit and push changes
      run: |
        git add blog/ sitemap.xml index.html services/ *.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated 5 blog posts [skip ci]"
        git push
