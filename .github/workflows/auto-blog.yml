# FINAL FIXED VERSION - Correct order of operations
name: Auto Blog Generator

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install python-slugify
        
    - name: Pull latest changes FIRST
      run: |
        git pull origin main
        
    - name: Generate blog posts
      run: |
        python main_runner.py
        
    - name: Configure Git
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
    - name: Commit and push changes
      run: |
        git add blog/ sitemap.xml index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated blog post [skip ci]"
        git push
