# UPDATED: Added pull step to fix push conflicts - March 3, 2026
name: Auto Blog Generator

on:
  schedule:
    # Run daily at 2 AM IST (8:30 PM UTC previous day)
    - cron: '30 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install python-slugify
        
    - name: Generate blog posts
      run: |
        python main_runner.py
        
    - name: Pull latest changes
      run: |
        git pull --rebase origin main
        
    - name: Commit and push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add blog/ sitemap.xml index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated blog post [skip ci]"
        git push
